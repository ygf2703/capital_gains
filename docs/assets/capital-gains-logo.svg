<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Capital Gains</title>
  <desc id="desc">Premium navy and gold financial analysis logo with magnifying glass, candlesticks and rising arrow.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0dfaa"/>
      <stop offset="0.52" stop-color="#c3a04a"/>
      <stop offset="1" stop-color="#967531"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071224"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071224" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="none"/>

  <g filter="url(#softShadow)" transform="translate(0 6)">
    <path d="M478 86c-156 0-282 124-282 277 0 55 16 106 45 149" fill="none" stroke="url(#navy)" stroke-width="35" stroke-linecap="round"/>
    <path d="M746 197c-51-68-129-111-217-111" fill="none" stroke="url(#navy)" stroke-width="35" stroke-linecap="round"/>
    <path d="M748 322c4 18 6 36 6 55 0 152-126 276-282 276-92 0-174-43-226-110" fill="none" stroke="url(#navy)" stroke-width="35" stroke-linecap="round"/>
    <path d="M728 565l88 89" fill="none" stroke="url(#navy)" stroke-width="34" stroke-linecap="round"/>
    <rect x="784" y="624" width="148" height="76" rx="22" transform="rotate(45 784 624)" fill="url(#navy)"/>

    <path d="M320 545h61v-92h-61zM409 545h61V412h-61zM498 545h61V360h-61zM587 545h61V300h-61zM676 545h61V246h-61z" fill="url(#navy)" opacity="0.96"/>

    <g stroke="url(#gold)" stroke-width="6" stroke-linecap="round">
      <line x1="324" y1="322" x2="324" y2="410"/><rect x="309" y="348" width="30" height="43" fill="url(#gold)" stroke="none"/>
      <line x1="378" y1="285" x2="378" y2="382"/><rect x="363" y="316" width="30" height="49" fill="url(#gold)" stroke="none"/>
      <line x1="432" y1="255" x2="432" y2="356"/><rect x="417" y="286" width="30" height="48" fill="url(#gold)" stroke="none"/>
      <line x1="486" y1="219" x2="486" y2="323"/><rect x="471" y="250" width="30" height="54" fill="url(#gold)" stroke="none"/>
      <line x1="540" y1="187" x2="540" y2="292"/><rect x="525" y="216" width="30" height="62" fill="url(#gold)" stroke="none"/>
      <line x1="594" y1="161" x2="594" y2="266"/><rect x="579" y="190" width="30" height="66" fill="url(#gold)" stroke="none"/>
    </g>

    <path d="M277 548l150-91 58 37 120-110 44 44 172-170" fill="none" stroke="url(#gold)" stroke-width="30" stroke-linejoin="miter" stroke-linecap="butt"/>
    <path d="M823 257l70-25-25 70z" fill="url(#gold)"/>

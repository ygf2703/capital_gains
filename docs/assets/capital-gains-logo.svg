  <g transform="translate(100 700)">
    <text x="0" y="0" fill="#071224" font-family="Georgia, 'Times New Roman', serif" font-size="86" letter-spacing="18">CAPITAL</text>
    <text x="625" y="0" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="86" letter-spacing="18">GAINS</text>
    <line x1="20" y1="57" x2="176" y2="57" stroke="#071224" stroke-width="3"/>
    <text x="215" y="68" fill="#071224" font-family="Arial, sans-serif" font-size="24" letter-spacing="19">ANALYZE . INVEST . GROW .</text>
    <line x1="815" y1="57" x2="975" y2="57" stroke="#071224" stroke-width="3"/>
  </g>
